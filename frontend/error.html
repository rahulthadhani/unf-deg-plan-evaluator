<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — UNF</title>
  <link rel="stylesheet" href="styles/shared.css">
  <style>body{display:flex;flex-direction:column;min-height:100vh;}</style>
</head>
<body>
  <div class="site-header">
    <img src="assets/UNF-logo-white.png" alt="University of North Florida" class="unf-logo">
    <nav class="header-nav">
      <button onclick="location.href='landing-page.html'">Home</button>
      <button onclick="location.href='calendar.html'">Class Schedule</button>
      <button onclick="location.href='degree-planner.html'">Degree Plan</button>
      <button onclick="location.href='catalog.html'">Course Catalog</button>
    </nav>
  </div>
  <div class="page-title-bar"><h1>Degree Planner</h1></div>
  <div class="section-divider"></div>
  <div class="state-container">
    <div class="state-code">!</div>
    <div class="state-title" id="et">An Error Occurred</div>
    <div class="state-msg" id="em">Something went wrong. Please try again or navigate back.</div>
    <button class="btn-primary" onclick="window.history.back()" style="margin-top:14px;">&#8592; Go Back</button>
  </div>
  <div class="site-footer">© University of North Florida · myWings Student Portal</div>
  <script>const p=new URLSearchParams(location.search);if(p.get('title'))document.getElementById('et').textContent=p.get('title');if(p.get('message'))document.getElementById('em').textContent=p.get('message');</script>
</body>
</html>
